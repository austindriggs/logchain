<!DOCTYPE html>
<html>
<head>
    <title>LogChain</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="{{ url_for('index_page') }}">LogChain Dashboard</a>
        </div>
        <ul class="nav-links">
            <li><a href="{{ url_for('index_page') }}">Home</a></li>
            <li><a href="{{ url_for('alert_page') }}">Alerts</a></li>
            <li><a href="{{ url_for('about_page') }}">About</a></li>
            <li><a href="https://github.com/austindriggs/logchain/" target="_blank">GitHub</a></li>
        </ul>
    </nav>

    <div class="dashboard-wrapper">

        <!-- LEFT: LOG DISPLAY -->
        <div class="log" id="log-panel">
            <h2>Container Logs</h2>
            <div id="log-content">
                <p>Select a block to view logs.</p>
            </div>
        </div>

        <!-- RIGHT: BLOCKCHAIN -->
        <div class="chain">
            <h2>Crypto Chain</h2>
            <div class="chain-visualization" id="chain-panel">
                <!-- dynamically filled -->
            </div>
        </div>

    </div>

    <script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
