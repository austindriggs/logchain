<!DOCTYPE html>
<html>
<head>
    <title>Docker Log Viewer</title>
    <style>
        body { font-family: sans-serif; background: #1e1e1e; color: #d4d4d4; padding: 20px; }
        .container-box { background: #252526; border: 1px solid #333; margin-bottom: 20px; padding: 15px; border-radius: 5px; }
        h2 { color: #569cd6; border-bottom: 1px solid #333; }
        pre { background: #000; padding: 10px; overflow-x: auto; color: #b5cea8; }
    </style>
</head>
<body>
    <h1>System Log Dashboard</h1>
    {% for name, lines in logs.items() %}
        <div class="container-box">
            <h2>Container: {{ name }}</h2>
            <pre>{% for line in lines %}{{ line }}{% endfor %}</pre>
        </div>
    {% endfor %}
</body>
</html>
